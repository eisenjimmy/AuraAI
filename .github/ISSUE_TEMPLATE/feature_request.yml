name: Feature request
description: Propose a focused improvement to the Aura AI Harness.
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    attributes:
      label: Problem
      description: Describe the user problem before proposing the solution.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Proposed behavior
    validations:
      required: true
  - type: textarea
    attributes:
      label: Permission and privacy impact
      description: Explain any new filesystem, network, shell, or macOS authority required.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Alternatives considered
