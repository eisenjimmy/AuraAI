name: Native macOS CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Swift toolchain
        run: swift --version
      - name: Test native harness
        run: swift test --package-path AuraNative
      - name: Build English and Korean apps
        run: |
          ./AuraNative/scripts/build-app.sh en
          ./AuraNative/scripts/build-app.sh ko
      - name: Verify app signatures
        run: |
          codesign --verify --deep --strict "release/Aura AI.app"
          codesign --verify --deep --strict "release/Aura AI Korean.app"
